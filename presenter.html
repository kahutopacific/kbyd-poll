<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KBYD Poll — Presenter View</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Georgia&family=Inter:wght@400;500;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:#FFFFFF; color:#1E3A5F; min-height:100vh; overflow-x:hidden; }
  .stripe { height:8px; background:repeating-linear-gradient(90deg,#E94F1A 0,#E94F1A 30px,#1A1A1A 30px,#1A1A1A 60px); }
  .container { max-width:1200px; margin:0 auto; padding:30px 40px; }
  .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
  .top-bar h1 { font-family:Georgia,serif; font-size:16px; color:#1E3A5F; }
  .top-bar .controls { display:flex; gap:8px; }
  .btn { padding:8px 18px; border:none; border-radius:4px; font-family:'Inter',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; }
  .btn-orange { background:#E94F1A; color:#fff; }
  .btn-orange:hover { background:#d4440f; }
  .btn-navy { background:#1E3A5F; color:#fff; }
  .btn-navy:hover { background:#253D5C; }
  .btn-outline { background:transparent; color:#5A7088; border:1px solid #ddd; }
  .btn-outline:hover { border-color:#1E3A5F; color:#1E3A5F; }
  .btn-danger { background:#dc3545; color:#fff; }
  .btn-danger:hover { background:#c82333; }

  /* Question selector */
  .q-nav { display:flex; gap:6px; margin-bottom:24px; flex-wrap:wrap; }
  .q-tab { padding:8px 16px; border:2px solid #ddd; border-radius:4px; font-size:13px; font-weight:600; cursor:pointer; background:#fff; color:#5A7088; transition:all 0.2s; }
  .q-tab:hover { border-color:#E94F1A; color:#E94F1A; }
  .q-tab.active { background:#E94F1A; color:#fff; border-color:#E94F1A; }

  /* Presentation view */
  .presentation { background:#fff; border-radius:8px; padding:40px; min-height:500px; position:relative; }
  .pres-badge { display:inline-block; background:#E94F1A; color:#fff; font-size:12px; font-weight:700; padding:5px 16px; border-radius:3px; letter-spacing:2px; margin-bottom:16px; }
  .pres-question { font-family:Georgia,serif; font-size:32px; color:#1E3A5F; line-height:1.3; margin-bottom:32px; max-width:800px; }

  /* QR section */
  .qr-section { text-align:center; padding:60px 20px; }
  .qr-section h2 { font-family:Georgia,serif; font-size:28px; color:#1E3A5F; margin-bottom:8px; }
  .qr-section .code { font-size:48px; font-weight:700; color:#E94F1A; letter-spacing:6px; margin:20px 0; }
  .qr-section p { font-size:16px; color:#5A7088; }
  #qr-canvas { margin:20px auto; }

  /* Results bars */
  .result-row { margin-bottom:16px; }
  .result-label { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
  .result-option { font-size:16px; font-weight:500; color:#1E3A5F; }
  .result-letter { color:#E94F1A; font-weight:700; margin-right:8px; }
  .result-count { font-size:14px; color:#5A7088; }
  .result-bar-bg { height:40px; background:#F0F0F0; border-radius:4px; overflow:hidden; position:relative; }
  .result-bar { height:100%; background:#1E3A5F; border-radius:4px; transition:width 0.8s cubic-bezier(0.25,0.46,0.45,0.94); display:flex; align-items:center; padding-left:12px; min-width:0; }
  .result-bar .pct { color:#fff; font-weight:700; font-size:16px; white-space:nowrap; }
  .result-bar.highlight { background:#E94F1A; }

  /* Total voters */
  .total-bar { text-align:center; margin-top:24px; padding-top:16px; border-top:2px solid #E94F1A; }
  .total-bar .num { font-size:36px; font-weight:700; color:#E94F1A; }
  .total-bar .label { font-size:14px; color:#5A7088; }

  /* Waiting state */
  .waiting { text-align:center; padding:80px 20px; }
  .waiting h2 { font-family:Georgia,serif; font-size:28px; color:#1E3A5F; margin-bottom:12px; }
  .waiting p { color:#5A7088; font-size:16px; }

  /* Footer */
  .footer { display:flex; justify-content:space-between; align-items:center; margin-top:24px; padding-top:12px; border-top:1px solid #eee; }
  .footer span { font-size:12px; color:#999; }
  .live-dot { display:inline-block; width:8px; height:8px; background:#E94F1A; border-radius:50%; animation:blink 1s infinite; margin-right:6px; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Fullscreen mode */
  .fullscreen .top-bar, .fullscreen .q-nav, .fullscreen .footer { display:none; }
  .fullscreen .presentation { min-height:100vh; display:flex; flex-direction:column; justify-content:center; border-radius:0; }
  .fullscreen .pres-question { font-size:42px; }
  .fullscreen .result-option { font-size:20px; }
  .fullscreen .result-bar-bg { height:52px; }
  .fullscreen .result-bar .pct { font-size:20px; }
</style>
</head>
<body>
<div class="stripe"></div>
<div class="container" id="main">
  <div class="top-bar">
    <h1>KBYD POLL — PRESENTER VIEW</h1>
    <div class="controls">
      <button class="btn btn-outline" onclick="toggleFullscreen()">Fullscreen</button>
      <button class="btn btn-navy" onclick="showQR()">Show QR Code</button>
      <button class="btn btn-danger" onclick="resetAll()">Reset All</button>
    </div>
  </div>

  <div class="q-nav" id="q-nav"></div>

  <div class="presentation" id="presentation">
    <div class="waiting">
      <h2>Select a question to begin</h2>
      <p>Use the tabs above or press 1-5 on your keyboard</p>
    </div>
  </div>

  <div class="footer">
    <span><span class="live-dot"></span>Live — Kahuto Pacific</span>
    <span id="voter-count">0 participants</span>
  </div>
</div>
<div class="stripe"></div>

<!-- QR Code library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
// ===== CONFIGURATION =====
const API_BASE = "https://empty-forest-4519.nikhil-singh3168.workers.dev"; // UPDATE THIS
const AUDIENCE_URL = "https://kahutopacific.github.io/kbyd-poll/"; // UPDATE THIS
const RESULTS_INTERVAL = 1500;

const QUESTIONS = [
  { id:1, question:"Before today, did you know what utilities are under your project site?", options:["Yes — I had full visibility","Partially — some records available","No — it was a complete unknown","Not sure"] },
  { id:2, question:"Has your project ever been delayed by an unexpected utility strike?", options:["Yes — it happened to us","No — but I've heard of cases","No — never encountered it"] },
  { id:3, question:"Had you heard of Ground Penetrating Radar (GPR) before tonight?", options:["Yes — I know what it is","Heard the name, not sure what it does","No — first time hearing about it"] },
  { id:4, question:"What quality level do you think most Fiji projects currently operate at?", options:["QL-D — Existing records only","QL-C — Surface features & marking","QL-B — GPR / EM detection","Don't know"] },
  { id:5, question:"Would you use a pre-dig notification service if it existed in Fiji?", options:["Absolutely — sign me up","Maybe — need more info","Not relevant to my work"] }
];

let activeQ = 0;
let showingResults = false;
let resultsTimer = null;

// Build question nav
const qNav = document.getElementById("q-nav");
QUESTIONS.forEach((q, i) => {
  const tab = document.createElement("div");
  tab.className = "q-tab";
  tab.textContent = `Q${q.id}: ${q.question.substring(0, 40)}...`;
  tab.onclick = () => activateQuestion(q.id);
  tab.id = `tab-${q.id}`;
  qNav.appendChild(tab);
});

// Keyboard shortcuts
document.addEventListener("keydown", (e) => {
  if (e.key >= "1" && e.key <= "5") activateQuestion(parseInt(e.key));
  if (e.key === "r" || e.key === "R") toggleResults();
  if (e.key === "f" || e.key === "F") toggleFullscreen();
  if (e.key === "q" || e.key === "Q") showQR();
  if (e.key === "Escape") deactivateQuestion();
});

async function activateQuestion(id) {
  activeQ = id;
  showingResults = false;

  // Update tabs
  document.querySelectorAll(".q-tab").forEach(t => t.classList.remove("active"));
  document.getElementById(`tab-${id}`)?.classList.add("active");

  // Tell the server
  await fetch(API_BASE + "/api/active", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ questionId: id })
  });

  renderVoting(id);
  startResultsPolling(id);
}

function deactivateQuestion() {
  activeQ = 0;
  fetch(API_BASE + "/api/active", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ questionId: 0 })
  });
  document.querySelectorAll(".q-tab").forEach(t => t.classList.remove("active"));
  clearInterval(resultsTimer);
  document.getElementById("presentation").innerHTML = `
    <div class="waiting">
      <h2>Select a question to begin</h2>
      <p>Use the tabs above or press 1-5</p>
    </div>`;
}

function renderVoting(id) {
  const q = QUESTIONS.find(x => x.id === id);
  const pres = document.getElementById("presentation");

  const optionsHtml = q.options.map((opt, i) => {
    const letter = String.fromCharCode(65 + i);
    return `<div class="result-row">
      <div class="result-label">
        <span class="result-option"><span class="result-letter">${letter}</span>${opt}</span>
        <span class="result-count" id="count-${i}">0 votes</span>
      </div>
      <div class="result-bar-bg">
        <div class="result-bar" id="bar-${i}" style="width:0%">
          <span class="pct" id="pct-${i}">0%</span>
        </div>
      </div>
    </div>`;
  }).join("");

  pres.innerHTML = `
    <div class="pres-badge">LIVE POLL</div>
    <div class="pres-question">${q.question}</div>
    <div id="results-area">${optionsHtml}</div>
    <div class="total-bar">
      <div class="num" id="total-num">0</div>
      <div class="label">total votes</div>
    </div>
    <div style="text-align:center;margin-top:16px;">
      <button class="btn btn-orange" onclick="toggleResults()" id="reveal-btn">Reveal Results</button>
    </div>`;
}

function startResultsPolling(id) {
  clearInterval(resultsTimer);
  resultsTimer = setInterval(() => fetchResults(id), RESULTS_INTERVAL);
  fetchResults(id);
}

async function fetchResults(id) {
  try {
    const res = await fetch(API_BASE + `/api/results/${id}`);
    const data = await res.json();
    updateBars(id, data.results, data.total);
  } catch (e) {
    console.error("Results fetch failed:", e);
  }
}

function updateBars(qId, results, total) {
  const q = QUESTIONS.find(x => x.id === qId);
  if (!q) return;

  document.getElementById("total-num").textContent = total;
  document.getElementById("voter-count").textContent = total + " participants";

  let maxVotes = 0;
  q.options.forEach((_, i) => {
    const v = results[i] || 0;
    if (v > maxVotes) maxVotes = v;
  });

  q.options.forEach((_, i) => {
    const votes = results[i] || 0;
    const pct = total > 0 ? Math.round((votes / total) * 100) : 0;

    const bar = document.getElementById(`bar-${i}`);
    const pctEl = document.getElementById(`pct-${i}`);
    const countEl = document.getElementById(`count-${i}`);

    if (bar && pctEl && countEl) {
      if (showingResults) {
        bar.style.width = (total > 0 ? Math.max(pct, 2) : 0) + "%";
        pctEl.textContent = pct + "%";
        countEl.textContent = votes + " vote" + (votes !== 1 ? "s" : "");

        // Highlight winner
        bar.classList.toggle("highlight", votes === maxVotes && votes > 0);
      } else {
        // Show vote count but not bars
        countEl.textContent = votes + " vote" + (votes !== 1 ? "s" : "");
        bar.style.width = "0%";
        pctEl.textContent = "";
      }
    }
  });
}

async function toggleResults() {
  showingResults = !showingResults;
  await fetch(API_BASE + "/api/show-results", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ show: showingResults })
  });
  const btn = document.getElementById("reveal-btn");
  if (btn) btn.textContent = showingResults ? "Hide Results" : "Reveal Results";
  fetchResults(activeQ);
}

function showQR() {
  const pres = document.getElementById("presentation");
  pres.innerHTML = `
    <div class="qr-section">
      <h2>Join the poll!</h2>
      <p>Scan the QR code or visit:</p>
      <div class="code">${AUDIENCE_URL.replace("https://","").replace("/kbyd-poll/","")}</div>
      <div id="qr-container" style="display:inline-block;margin:20px auto;"></div>
      <p style="margin-top:16px;font-size:18px;color:#1E3A5F;font-weight:600;">Know Before You Dig — Talanoa Evening</p>
    </div>`;

  new QRCode(document.getElementById("qr-container"), {
    text: AUDIENCE_URL,
    width: 220,
    height: 220,
    colorDark: "#1E3A5F",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.H
  });
}

async function resetAll() {
  if (!confirm("Reset all votes? This cannot be undone.")) return;
  await fetch(API_BASE + "/api/reset", { method: "POST" });
  if (activeQ) fetchResults(activeQ);
  alert("All votes cleared.");
}

function toggleFullscreen() {
  document.getElementById("main").classList.toggle("fullscreen");
}
</script>
</body>
</html>
